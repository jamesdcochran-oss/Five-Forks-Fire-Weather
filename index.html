<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Five Forks Fire Weather — Single File</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      :root {
        --bg:#f9fafb;
        --card:#ffffff;
        --muted:#6b7280;
        --shadow:0 2px 6px rgba(0,0,0,.08);
        --ok:#16a34a;
        --warn:#d97706;
        --err:#dc2626;
        --neutral:#475569;
      }

      body.dark {
        --bg:#020617;
        --card:#020617;
        --muted:#9ca3af;
        --neutral:#e5e7eb;
        color:#e5e7eb;
      }
      body.dark .badge{ background:#111827; color:var(--neutral); }

      *{box-sizing:border-box}
      html,body{height:100%}
      body{
        margin:0;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
        background:var(--bg);
        color:#0f172a;
      }

      .app-header{
        display:flex;
        align-items:center;
        justify-content:space-between;
        padding:.75rem 1rem;
        background:#1d4ed8;
        color:#fff;
      }

      .app-header h1{margin:0;font-size:1.15rem}
      .statusbar{display:flex;gap:.5rem;align-items:center;justify-content:center;flex-wrap:wrap}
      .quick-links{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
      .badge{
        padding:.25rem .5rem;
        border-radius:999px;
        font-size:.8rem;
        box-shadow:var(--shadow);
        background:#e5e7eb;
        color:var(--neutral);
      }
      .badge.ok{color:#fff;background:var(--ok)}
      .badge.warn{color:#fff;background:var(--warn)}
      .badge.err{color:#fff;background:var(--err)}

      main{display:grid;gap:1rem;padding:1rem}
      .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:1rem}
      .card{background:var(--card);border-radius:12px;padding:.9rem;box-shadow:var(--shadow)}
      .card h3{margin:0 0 .25rem;display:flex;align-items:center;gap:.4rem;font-size:1.05rem}
      .dim{color:var(--muted);font-size:.9rem}
      .metric{margin:.25rem 0}

      .map-wrap{height:480px;border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
      #map{height:100%;width:100%}
      .legend{background:#fff;padding:6px 8px;border-radius:8px;box-shadow:var(--shadow)}
      .legend .row{display:flex;align-items:center;gap:6px;margin:4px 0}
      .legend .swatch{width:12px;height:12px;border-radius:50%;display:inline-block}

      .alerts{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:.75rem;border-radius:8px;box-shadow:var(--shadow)}
      .app-footer{text-align:center;color:var(--muted);padding:.75rem}

      @media (max-width:768px){
        .app-header{flex-direction:column;gap:.75rem;padding:1rem}
        .app-header h1{font-size:1.5rem;text-align:center}
        .quick-links{justify-content:center;width:100%}
        .quick-links .badge{font-size:.75rem;padding:.2rem .4rem}
        main{padding:.75rem;gap:.75rem}
        .cards{grid-template-columns:1fr;gap:.75rem}
        .card{padding:.75rem}
        .map-wrap{height:300px;margin-bottom:1rem}
        .app-footer{padding:.5rem;font-size:.85rem}
        .statusbar .badge{font-size:.7rem;padding:.2rem .4rem}
      }
      @media (min-width:960px){
        main{grid-template-columns:1.2fr 1fr;align-items:start}
        .map-wrap{grid-row:span 2}
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <h1>🔥 Five Forks Fire Weather</h1>
      <div class="quick-links">
        <a href="https://firms.modaps.eosdis.nasa.gov/map/" target="_blank" class="badge" style="text-decoration:none">🛰️ FIRMS</a>
        <a href="https://www.weather.gov/akq/" target="_blank" class="badge" style="text-decoration:none">🌧️ NWS</a>
        <a href="https://maps.app.goo.gl/vcWebUQrrLSY8gX4A" target="_blank" class="badge" style="text-decoration:none">🗺️ Equip</a>
        <a href="https://www.windy.com/?37.233,-77.400,8" target="_blank" class="badge" style="text-decoration:none">🌪️ Windy</a>
        <button id="themeToggle" class="badge">🌙 Dark</button>
      </div>
    </header>

    <main>
      <section id="cards" class="cards" aria-label="County conditions"></section>
      <section class="map-wrap" aria-label="Hotspots map">
        <div id="map"></div>
      </section>
      <section id="alerts" class="alerts" aria-live="polite" hidden></section>
    </main>

    <footer class="app-footer">
      <div class="statusbar" style="margin-bottom:0.5rem" aria-live="polite">
        <span id="status-noaa" class="badge" title="NOAA Weather API">NOAA ⏳</span>
        <span id="status-firms" class="badge" title="NASA FIRMS GeoJSON">FIRMS ⏳</span>
        <span id="status-hotspots" class="badge" title="Chosen hotspot source">Hotspots ⏳</span>
        <span id="status-tiles" class="badge" title="Map tiles (OSM)">Tiles ⏳</span>
      </div>
      <small>Data: NOAA NWS & NASA FIRMS · Auto-refresh hourly</small>
    </footer>

    <!-- Libraries -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

    <script>
      const CONFIG = {
        BUFFER_KM: 30,
        REFRESH_MS: 60 * 60 * 1000
      };

      const COUNTIES = [
        { name: "Amelia",        lat: 37.342, lon: -77.980 },
        { name: "Nottoway",      lat: 37.142, lon: -78.089 },
        { name: "Dinwiddie",     lat: 37.077, lon: -77.587 },
        { name: "Prince George", lat: 37.221, lon: -77.288 },
        { name: "Brunswick",     lat: 36.758, lon: -77.847 },
        { name: "Greensville",   lat: 36.686, lon: -77.542 },
      ];

      const BUFFER_KM = CONFIG.BUFFER_KM;
      const FIRMS_URL = "https://firms.modaps.eosdis.nasa.gov/api/area/geojson/6ec6f9501dda0774853f77ee933238ed/VIIRS_NOAA20_NRT/-79,36,-77,38/2";
      const NWS_HOTSPOT_GEOJSON_URL = "https://www.weather.gov/source/dlh/fire-hotspots.geojson";
      const LOCAL_CSV_URL = "./hotspots.csv";
      const INLINE_CSV = `latitude,longitude,bright_ti4,scan,track,acq_date,acq_time,satellite,instrument,confidence,version,bright_ti5,frp,daynight
37.18095,-77.4473,317.15,0.39,0.36,2026-07-20,709,N20,VIIRS,n,2.0NRT,292.83,1.6,N
37.32526,-77.80234,310.35,0.39,0.36,2026-07-20,709,N20,VIIRS,n,2.0NRT,290.72,0.77,N
37.47763,-78.43346,302.49,0.38,0.36,2026-07-20,709,N20,VIIRS,n,2.0NRT,291.34,0.64,N`;

      const NOAA_HEADERS = {
        "Accept": "application/geo+json",
        "User-Agent": "Five-Forks-Fire-Weather (https://github.com/jamesdcochran-oss/Five-Forks-Fire-Weather)"
      };

      function setBadge(id, state, label){
        const el = document.getElementById(id);
        if(!el) return;
        el.classList.remove("ok","warn","err");
        if (state) el.classList.add(state);
        if (label) el.textContent = label;
      }
      function showAlert(msg){
        const box = document.getElementById("alerts");
        if(!box) return;
        box.hidden = false;
        box.textContent = msg;
      }

      let map, layers = {};
      const countyBuffers = new Map();

      function getCountyBuffer(county){
        if(!countyBuffers.has(county.name)){
          countyBuffers.set(
            county.name,
            turf.circle([county.lon, county.lat], BUFFER_KM, {units:"kilometers", steps:64})
          );
        }
        return countyBuffers.get(county.name);
      }
      function initMap(){
        map = L.map("map");
        const tiles = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 18,
          attribution: "© OpenStreetMap contributors"
        });
        tiles.on("load", () => setBadge("status-tiles","ok","Tiles ✅"));
        tiles.on("tileerror", () => setBadge("status-tiles","err","Tiles ❌"));
        tiles.addTo(map);

        L.control.scale({ metric: false }).addTo(map);

        layers.hotspots = L.layerGroup().addTo(map);
        layers.buffers  = L.layerGroup().addTo(map);
        layers.centers  = L.layerGroup().addTo(map);

        const overlays = {
          "🔥 Hotspots": layers.hotspots,
          "🟢 Buffers (30 km)": layers.buffers,
          "📍 County centers": layers.centers
        };
        L.control.layers({}, overlays, { collapsed: true }).addTo(map);

        const legend = L.control({ position: "bottomright" });
        legend.onAdd = () => {
          const div = L.DomUtil.create("div","legend");
          div.innerHTML = `
            <div class="row"><span class="swatch" style="background:#ef4444"></span>Hotspot</div>
            <div class="row"><span class="swatch" style="background:#22c55e"></span>30 km buffer</div>
            <div class="row"><span class="swatch" style="background:#0ea5e9"></span>County center</div>`;
          return div;
        };
        legend.addTo(map);
      }

      function parseCsvLine(line) {
        const out = [];
        let cur = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') {
            if (inQuotes && line[i + 1] === '"') { cur += '"'; i++; }
            else inQuotes = !inQuotes;
          } else if (ch === "," && !inQuotes) {
            out.push(cur); cur = "";
          } else {
            cur += ch;
          }
        }
        out.push(cur);
        return out.map(s => s.trim());
      }

      function parseCsv(csvText){
        const lines = csvText.trim().split(/\r?\n/).filter(Boolean);
        if (lines.length < 2) return [];
        const headers = parseCsvLine(lines[0]);
        return lines.slice(1).map(line => {
          const cols = parseCsvLine(line);
          const row = {};
          headers.forEach((h,i) => row[h] = cols[i] ?? "");
          return row;
        });
      }

      function toNum(v, fallback = 0){
        const n = Number(v);
        return Number.isFinite(n) ? n : fallback;
      }

      function csvRowsToGeojson(rows){
        return {
          type: "FeatureCollection",
          features: rows
            .filter(r => r.latitude && r.longitude)
            .map(r => ({
              type: "Feature",
              geometry: { type: "Point", coordinates: [toNum(r.longitude), toNum(r.latitude)] },
              properties: { ...r }
            }))
        };
      }

      async function fetchFromNWSGeoJSON(){
        const res = await fetch(NWS_HOTSPOT_GEOJSON_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`NWS hotspots status ${res.status}`);
        const data = await res.json();
        if (!data?.features || !Array.isArray(data.features)) throw new Error("NWS hotspots invalid");
        return { source: "nws", geojson: data };
      }

      async function fetchFromLocalCSV(){
        const res = await fetch(LOCAL_CSV_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`Local CSV status ${res.status}`);
        const text = await res.text();
        const rows = parseCsv(text);
        return { source: "local-csv", geojson: csvRowsToGeojson(rows) };
      }

      function fetchFromInlineCSV(){
        return { source: "inline-csv", geojson: csvRowsToGeojson(parseCsv(INLINE_CSV)) };
      }

      async function fetchHotspots(){
        try {
          const res = await fetch(FIRMS_URL, { cache: "no-store" });
          if(!res.ok) throw new Error(`FIRMS status ${res.status}`);
          const text = await res.text();

          try {
            const geojson = JSON.parse(text);
            if (geojson && Array.isArray(geojson.features)) {
              setBadge("status-firms","ok","FIRMS ✅");
              setBadge("status-hotspots","ok","Hotspots: FIRMS");
              return { source: "firms", geojson };
            }
          } catch (_) {}

          const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
          if (lines.length > 1) {
            const headers = parseCsvLine(lines[0]);
            const data = lines.slice(1).map(line => {
              const values = parseCsvLine(line);
              const obj = {};
              headers.forEach((h, i) => obj[h] = values[i] ?? "");
              return obj;
            });
            const features = data.map(row => ({
              type: "Feature",
              geometry: { type: "Point", coordinates: [toNum(row.longitude, NaN), toNum(row.latitude, NaN)] },
              properties: row
            })).filter(f => Number.isFinite(f.geometry.coordinates[0]) && Number.isFinite(f.geometry.coordinates[1]));

            setBadge("status-firms","ok","FIRMS ✅");
            setBadge("status-hotspots","ok","Hotspots: FIRMS CSV");
            return { source: "firms-csv", geojson: { type: "FeatureCollection", features } };
          }

          throw new Error("FIRMS returned no usable features");
        } catch (firmsErr) {
          console.warn("FIRMS failed, using fallback chain:", firmsErr);
          setBadge("status-firms","warn","FIRMS ⚠️");
        }

        try {
          const nws = await fetchFromNWSGeoJSON();
          setBadge("status-hotspots","warn","Hotspots: NWS fallback");
          return nws;
        } catch (e) { console.warn("NWS hotspot fallback failed:", e); }

        try {
          const local = await fetchFromLocalCSV();
          setBadge("status-hotspots","warn","Hotspots: local CSV fallback");
          return local;
        } catch (e) { console.warn("Local CSV fallback failed:", e); }

        const inline = fetchFromInlineCSV();
        setBadge("status-hotspots","warn","Hotspots: inline fallback");
        return inline;
      }

      async function fetchNOAAHourly(lat, lon){
        try {
          const p = await fetch(`https://api.weather.gov/points/${lat},${lon}`, { headers: NOAA_HEADERS });
          if(!p.ok) throw new Error(`points status ${p.status}`);
          const meta = await p.json();
          const hourlyUrl = meta?.properties?.forecastHourly;
          if(!hourlyUrl) throw new Error("missing forecastHourly");
          const f = await fetch(hourlyUrl, { cache: "no-store", headers: NOAA_HEADERS });
          if(!f.ok) throw new Error(`hourly status ${f.status}`);
          const hourly = await f.json();
          setBadge("status-noaa","ok","NOAA ✅");
          return hourly?.properties?.periods?.[0] ?? null;
        } catch(e) {
          console.warn("NOAA fetch failed", e);
          setBadge("status-noaa","warn","NOAA ⚠️");
          return null;
        }
      }

      function renderCardsStart(){
        const cards = document.getElementById("cards");
        if (cards) cards.innerHTML = "";
      }

      function renderCountyCard({ name }, now, hotspotCount){
        const cards = document.getElementById("cards");
        if (!cards) return;

        const el = document.createElement("article");
        el.className = "card";
        const summary = now
          ? `${now.temperature}\u00B0F • ${now.relativeHumidity?.value ?? "N/A"}% RH • ${now.windSpeed ?? "N/A"} ${now.windDirection ?? ""}`
          : "N/A";
        const label = now?.shortForecast ?? "N/A";
        el.innerHTML = `
          <h3>${label.includes("Thunder") ? "⛈️" : "🌤️"} ${name}</h3>
          <div class="dim">Class: ${label}</div>
          <div class="metric">Wx: ${summary}</div>
          <div class="metric">Hotspots (≤ ${BUFFER_KM} km): <strong>${hotspotCount}</strong></div>
        `;
        cards.appendChild(el);
      }

      function drawBuffersAndCenters(){
        layers.buffers.clearLayers();
        layers.centers.clearLayers();

        const circles = [];
        for(const c of COUNTIES){
          const circle = getCountyBuffer(c);
          L.geoJSON(circle, { style: { color:"#22c55e", weight:1, fillOpacity:0.08 } }).addTo(layers.buffers);
          circles.push(circle);

          L.circleMarker([c.lat,c.lon], {
            radius:5, color:"#0ea5e9", fillColor:"#0ea5e9", fillOpacity:.9
          }).bindTooltip(c.name).addTo(layers.centers);
        }

        const bbox = turf.bbox(turf.featureCollection(circles));
        const sw = [bbox[1], bbox[0]];
        const ne = [bbox[3], bbox[2]];
        map.fitBounds([sw, ne], { padding:[30,30] });
      }

      function drawHotspots(geojson, sourceLabel){
        layers.hotspots.clearLayers();
        if(!geojson?.features?.length) return;

        L.geoJSON(geojson, {
          filter: f => f && f.geometry && f.geometry.type === "Point",
          pointToLayer: (f, latlng) => {
            const marker = L.circleMarker(latlng, {
              radius:4, color:"#ef4444", fillColor:"#ef4444", fillOpacity:.85, weight:1
            });
            const props = f.properties || {};
            const time = props.acq_date ? `${props.acq_date} ${props.acq_time ?? ""}` : (props.time ?? "");
            const instrument = props.instrument || props.satellite || "";
            const confidence = props.confidence ? `• ${props.confidence}` : (props.confidence_level ? `• ${props.confidence_level}` : "");
            const popup = `<strong>🔥 Active fire</strong><br>Source: ${sourceLabel}<br>${time}<br>${instrument} ${confidence}`.trim();
            marker.bindPopup(popup);
            return marker;
          }
        }).addTo(layers.hotspots);
      }

      async function refresh(){
        renderCardsStart();

        const hotspotResult = await fetchHotspots();
        const geojson = hotspotResult?.geojson ?? { type:"FeatureCollection", features:[] };
        drawHotspots(geojson, hotspotResult?.source || "unknown");
        drawBuffersAndCenters();

        const features = geojson.features ?? [];

        const results = await Promise.all(
          COUNTIES.map(async (county) => {
            const now = await fetchNOAAHourly(county.lat, county.lon);
            const buffer = getCountyBuffer(county);
            const count = features.reduce((acc, f) => {
              if(!f.geometry || f.geometry.type !== "Point") return acc;
              const [x,y] = f.geometry.coordinates;
              return acc + (turf.booleanPointInPolygon(turf.point([x,y]), buffer) ? 1 : 0);
            },0);
            return {county, now, count};
          })
        );

        results.forEach(r => renderCountyCard(r.county, r.now, r.count));

        const names = [...document.querySelectorAll("#cards .card h3")].map(h => h.textContent);
        if (!names.some(t => t.includes("Brunswick")) || !names.some(t => t.includes("Greensville"))){
          showAlert("Self-check failed: Brunswick and/or Greensville not rendered.");
        } else {
          const box = document.getElementById("alerts");
          if (box) box.hidden = true;
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        initMap();
        refresh();
        setInterval(refresh, CONFIG.REFRESH_MS);
      });
    </script>

    <script>
      const toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.addEventListener("click", () => {
          document.body.classList.toggle("dark");
          toggle.textContent = document.body.classList.contains("dark") ? "☀️ Light" : "🌙 Dark";
        });
      }
    </script>

    <!-- Self-demo panel -->
    <script>
      if(false){(function runSelfDemo() {
        const panel = document.createElement("div");
        panel.style.position = "fixed";
        panel.style.right = "10px";
        panel.style.bottom = "10px";
        panel.style.zIndex = "99999";
        panel.style.maxWidth = "360px";
        panel.style.background = "#111";
        panel.style.color = "#fff";
        panel.style.font = "12px/1.4 monospace";
        panel.style.padding = "10px";
        panel.style.borderRadius = "8px";
        panel.style.boxShadow = "0 2px 10px rgba(0,0,0,.35)";
        panel.innerHTML = '<b>Self-demo</b><div id="demo-log" style="margin-top:6px"></div>';
        document.body.appendChild(panel);

        const logEl = panel.querySelector("#demo-log");
        const log = (msg, ok = true) => {
          const row = document.createElement("div");
          row.textContent = `${ok ? "✅" : "❌"} ${msg}`;
          row.style.color = ok ? "#86efac" : "#fca5a5";
          logEl.appendChild(row);
        };

        setTimeout(() => {
          try {
            log("DOM loaded");
            log(typeof L !== "undefined" ? "Leaflet loaded" : "Leaflet missing", typeof L !== "undefined");
            log(typeof turf !== "undefined" ? "Turf loaded" : "Turf missing", typeof turf !== "undefined");

            const mapEl = document.getElementById("map");
            log(mapEl ? "#map element present" : "#map missing", !!mapEl);

            const tiles = document.getElementById("status-tiles")?.textContent || "";
            log(tiles.includes("✅") ? "Tiles loaded" : "Tiles not confirmed yet", tiles.includes("✅"));

            const firms = document.getElementById("status-firms")?.textContent || "";
            log(
              firms.includes("✅") || firms.includes("⚠️") || firms.includes("❌")
                ? `FIRMS status seen: ${firms}`
                : "FIRMS status not updated yet",
              firms.includes("✅") || firms.includes("⚠️") || firms.includes("❌")
            );

            const hotspots = document.getElementById("status-hotspots")?.textContent || "";
            log(
              hotspots.includes("FIRMS") || hotspots.includes("fallback")
                ? `Hotspot source seen: ${hotspots}`
                : "Hotspot source not updated yet",
              hotspots.includes("FIRMS") || hotspots.includes("fallback")
            );

            const noaa = document.getElementById("status-noaa")?.textContent || "";
            log(
              noaa.includes("✅") || noaa.includes("⚠️")
                ? `NOAA status seen: ${noaa}`
                : "NOAA status not updated yet",
              noaa.includes("✅") || noaa.includes("⚠️")
            );

            const cards = document.querySelectorAll("#cards .card").length;
            log(cards > 0 ? `Cards rendered: ${cards}` : "No county cards rendered yet", cards > 0);

            const alertVisible = !document.getElementById("alerts")?.hidden;
            if (alertVisible) log("Self-check alert is visible", false);
            else log("Self-check alert not visible");
          } catch (e) {
            log("Self-demo crashed: " + e.message, false);
          }
        }, 3000);
      })();}
    </script>
  </body>
</html>
