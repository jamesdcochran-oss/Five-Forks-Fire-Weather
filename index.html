@@ -1,6 +1,18 @@
 <!-- existing markup -->
 
+<!-- Hotspot source status -->
+<div id="hotspot-status" data-level="info" style="margin:8px 0;font:14px/1.3 sans-serif;">
+  Hotspots: loading...
+</div>
+
 <!-- existing map/container markup -->
 
 <script>
+  /*
+   * NWS-first hotspot loader with CSV fallbacks.
+   * Goal: avoid direct FIRMS dependency in app code.
+   */
+
+  // ====== CONFIG ======
+  const HOTSPOT_REFRESH_MS = 2 * 60 * 1000;
+  const NWS_HOTSPOT_GEOJSON_URL = "https://www.weather.gov/source/dlh/fire-hotspots.geojson"; // replace if needed
+  const LOCAL_CSV_URL = "hotspots.csv"; // optional local snapshot in repo root
+  const INLINE_CSV = `latitude,longitude,bright_ti4,scan,track,acq_date,acq_time,satellite,instrument,confidence,version,bright_ti5,frp,daynight
+37.18095,-77.4473,317.15,0.39,0.36,2026-07-20,709,N20,VIIRS,n,2.0NRT,292.83,1.6,N
+37.32526,-77.80234,310.35,0.39,0.36,2026-07-20,709,N20,VIIRS,n,2.0NRT,290.72,0.77,N
+37.47763,-78.43346,302.49,0.38,0.36,2026-07-20,709,N20,VIIRS,n,2.0NRT,291.34,0.64,N`;
+
+  // ====== STATUS ======
+  function setHotspotStatus(message, level) {
+    var el = document.getElementById("hotspot-status");
+    if (!el) return;
+    el.textContent = "Hotspots: " + message;
+    el.setAttribute("data-level", level || "info");
+  }
+
+  // ====== CSV HELPERS ======
+  function parseCsv(csvText) {
+    var lines = csvText.trim().split(/\r?\n/);
+    var headers = lines[0].split(",").map(function (h) { return h.trim(); });
+    return lines.slice(1).map(function (line) {
+      var cols = line.split(",").map(function (c) { return c.trim(); });
+      var row = {};
+      headers.forEach(function (h, i) { row[h] = cols[i] || ""; });
+      return row;
+    });
+  }
+
+  function csvRowsToFeatureCollection(rows) {
+    var features = rows
+      .filter(function (r) { return r.latitude && r.longitude; })
+      .map(function (r) {
+        return {
+          type: "Feature",
+          geometry: {
+            type: "Point",
+            coordinates: [Number(r.longitude), Number(r.latitude)]
+          },
+          properties: {
+            bright_ti4: Number(r.bright_ti4),
+            bright_ti5: Number(r.bright_ti5),
+            frp: Number(r.frp),
+            scan: Number(r.scan),
+            track: Number(r.track),
+            acq_date: r.acq_date,
+            acq_time: r.acq_time,
+            satellite: r.satellite,
+            instrument: r.instrument,
+            confidence: r.confidence,
+            version: r.version,
+            daynight: r.daynight
+          }
+        };
+      });
+    return { type: "FeatureCollection", features: features };
+  }
+
+  // ====== SOURCE LOADERS ======
+  async function loadHotspotsFromNws() {
+    var res = await fetch(NWS_HOTSPOT_GEOJSON_URL, { cache: "no-store" });
+    if (!res.ok) throw new Error("NWS hotspot fetch failed: " + res.status);
+    var data = await res.json();
+    if (!data || !data.features || !data.features.length) throw new Error("NWS hotspot data empty");
+    return { source: "nws", data: data };
+  }
+
+  async function loadHotspotsFromLocalCsv() {
+    var res = await fetch(LOCAL_CSV_URL, { cache: "no-store" });
+    if (!res.ok) throw new Error("local CSV fetch failed: " + res.status);
+    var text = await res.text();
+    var rows = parseCsv(text);
+    if (!rows.length) throw new Error("local CSV empty");
+    return { source: "local-csv", data: csvRowsToFeatureCollection(rows) };
+  }
+
+  function loadHotspotsFromInlineCsv() {
+    var rows = parseCsv(INLINE_CSV);
+    return { source: "inline-csv", data: csvRowsToFeatureCollection(rows) };
+  }
+
+  async function loadHotspotsWithFallback() {
+    // 1) NWS source
+    try {
+      return await loadHotspotsFromNws();
+    } catch (errNws) {
+      console.warn(errNws.message);
+    }
+    // 2) local CSV
+    try {
+      return await loadHotspotsFromLocalCsv();
+    } catch (errCsv) {
+      console.warn(errCsv.message);
+    }
+    // 3) inline CSV
+    return loadHotspotsFromInlineCsv();
+  }
+
+  // ====== MAP INTEGRATION ======
+  // IMPORTANT: adapt this function to your existing map layer logic if needed.
+  // It will work out-of-the-box for OpenLayers if `map` is global.
+  var hotspotLayer;
+  function renderHotspots(featureCollection) {
+    if (typeof ol === "undefined" || typeof map === "undefined") {
+      // fallback: keep app safe if map/ol not ready
+      console.log("Hotspots loaded:", featureCollection.features.length);
+      return;
+    }
+
+    var source = new ol.source.Vector({
+      features: new ol.format.GeoJSON().readFeatures(featureCollection, {
+        featureProjection: "EPSG:3857"
+      })
+    });
+
+    if (!hotspotLayer) {
+      hotspotLayer = new ol.layer.Vector({
+        title: "Hotspots (NWS/CSV)",
+        source: source,
+        style: new ol.style.Style({
+          image: new ol.style.Circle({
+            radius: 5,
+            fill: new ol.style.Fill({ color: "rgba(255,80,0,0.9)" }),
+            stroke: new ol.style.Stroke({ color: "#000", width: 1 })
+          })
+        })
+      });
+      map.addLayer(hotspotLayer);
+    } else {
+      hotspotLayer.setSource(source);
+    }
+  }
+
+  async function refreshHotspots() {
+    try {
+      var result = await loadHotspotsWithFallback();
+      renderHotspots(result.data);
+      if (result.source === "nws") setHotspotStatus("NWS source", "ok");
+      else if (result.source === "local-csv") setHotspotStatus("local CSV fallback", "warn");
+      else setHotspotStatus("inline CSV emergency fallback", "warn");
+    } catch (e) {
+      console.error(e);
+      setHotspotStatus("failed to load", "error");
+    }
+  }
+
+  // initial + periodic refresh
+  refreshHotspots();
+  setInterval(refreshHotspots, HOTSPOT_REFRESH_MS);
+
   // ... keep existing script content ...
 </script>
