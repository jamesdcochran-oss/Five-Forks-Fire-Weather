<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Five Forks Fire Weather — Simple Radar Map</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
      :root {
        --bg:#f8fafc;
        --card:#ffffff;
        --text:#0f172a;
        --muted:#64748b;
        --shadow:0 2px 8px rgba(0,0,0,.08);
        --ok:#16a34a;
        --warn:#d97706;
        --neutral:#475569;
        --header:#1d4ed8;
      }

      body.dark {
        --bg:#020617;
        --card:#0f172a;
        --text:#e5e7eb;
        --muted:#94a3b8;
        --neutral:#cbd5e1;
      }

      * { box-sizing:border-box; }
      html, body { height:100%; }

      body {
        margin:0;
        font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
        background:var(--bg);
        color:var(--text);
      }

      .app-header {
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:1rem;
        padding:.85rem 1rem;
        background:var(--header);
        color:#fff;
      }

      .app-header h1 {
        margin:0;
        font-size:1.1rem;
      }

      .quick-links,
      .statusbar {
        display:flex;
        gap:.5rem;
        align-items:center;
        flex-wrap:wrap;
      }

      .badge {
        display:inline-block;
        padding:.3rem .55rem;
        border-radius:999px;
        font-size:.8rem;
        background:#e5e7eb;
        color:var(--neutral);
        box-shadow:var(--shadow);
        text-decoration:none;
        border:0;
      }

      body.dark .badge {
        background:#111827;
        color:#e5e7eb;
      }

      .badge.ok { background:var(--ok); color:#fff; }
      .badge.warn { background:var(--warn); color:#fff; }

      main {
        display:grid;
        gap:1rem;
        padding:1rem;
      }

      .cards {
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:1rem;
      }

      .card {
        background:var(--card);
        border-radius:12px;
        padding:.9rem;
        box-shadow:var(--shadow);
      }

      .card h3 {
        margin:0 0 .35rem;
        font-size:1rem;
      }

      .dim {
        color:var(--muted);
        font-size:.9rem;
      }

      .metric {
        margin:.3rem 0;
      }

      .map-wrap {
        height:520px;
        border-radius:12px;
        overflow:hidden;
        box-shadow:var(--shadow);
        background:var(--card);
      }

      #map {
        width:100%;
        height:100%;
      }

      .alerts {
        background:#fff7ed;
        border:1px solid #fed7aa;
        color:#9a3412;
        padding:.75rem;
        border-radius:8px;
        box-shadow:var(--shadow);
      }

      .app-footer {
        text-align:center;
        color:var(--muted);
        padding:.75rem;
      }

      .county-label {
        background:rgba(15,23,42,.82);
        color:#fff;
        border:0;
        border-radius:999px;
        padding:.15rem .45rem;
        font-size:.75rem;
        font-weight:600;
        box-shadow:none;
      }

      body.dark .county-label {
        background:rgba(255,255,255,.14);
        color:#fff;
      }

      @media (max-width:768px) {
        .app-header {
          flex-direction:column;
          text-align:center;
        }

        main {
          padding:.75rem;
          gap:.75rem;
        }

        .cards {
          grid-template-columns:1fr;
        }

        .map-wrap {
          height:340px;
        }
      }

      @media (min-width:960px) {
        main {
          grid-template-columns:1.15fr 1fr;
          align-items:start;
        }

        .map-wrap {
          grid-row:span 2;
        }
      }
    </style>
  </head>
  <body>
    <header class="app-header">
      <h1>🔥 Five Forks Fire Weather</h1>

      <div class="quick-links">
        <a href="https://www.weather.gov/akq/weatherstory" target="_blank" rel="noopener noreferrer" class="badge">📋 AKQ Story</a>
        <a href="https://radar.weather.gov/station/KAKQ/standard" target="_blank" rel="noopener noreferrer" class="badge">📡 Radar</a>
        <a href="http://www.weather.gov/akq/FIREMAIN" target="_blank" rel="noopener noreferrer" class="badge">🔥 Fire Wx</a>
        <button id="themeToggle" class="badge">🌙 Dark</button>
      </div>
    </header>

    <main>
      <section id="cards" class="cards" aria-label="County conditions"></section>

      <section class="map-wrap" aria-label="Simple radar map">
        <div id="map"></div>
      </section>

      <section id="alerts" class="alerts" aria-live="polite" hidden></section>
    </main>

    <footer class="app-footer">
      <div class="statusbar" style="justify-content:center; margin-bottom:.5rem;" aria-live="polite">
        <span id="status-noaa" class="badge" title="NOAA Weather API">NOAA ⏳</span>
        <span id="status-radar" class="badge" title="NOAA Radar WMS">Radar ⏳</span>
        <span id="status-tiles" class="badge" title="Map tiles">Tiles ⏳</span>
      </div>
      <small>County cards: NWS API · Map: NCEP OpenGeo CONUS base reflectivity WMS</small>
    </footer>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
      const COUNTIES = [
        { name: "Amelia",        lat: 37.342, lon: -77.980 },
        { name: "Nottoway",      lat: 37.142, lon: -78.089 },
        { name: "Dinwiddie",     lat: 37.077, lon: -77.587 },
        { name: "Prince George", lat: 37.221, lon: -77.288 },
        { name: "Brunswick",     lat: 36.758, lon: -77.847 },
        { name: "Greensville",   lat: 36.686, lon: -77.542 },
      ];

      const NOAA_HEADERS = {
        "Accept": "application/geo+json",
        "User-Agent": "Five-Forks-Fire-Weather (https://github.com/jamesdcochran-oss/Five-Forks-Fire-Weather)"
      };

      let map;
      let radarLayer;
      let countyLayer;

      function setBadge(id, state, label) {
        const el = document.getElementById(id);
        if (!el) return;
        el.classList.remove("ok", "warn");
        if (state) el.classList.add(state);
        if (label) el.textContent = label;
      }

      function showAlert(msg) {
        const box = document.getElementById("alerts");
        if (!box) return;
        box.hidden = false;
        box.textContent = msg;
      }

      function initMap() {
        map = L.map("map", {
          zoomControl: true,
          attributionControl: true
        });

        const base = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 18,
          attribution: "&copy; OpenStreetMap contributors"
        });

        base.on("load", () => setBadge("status-tiles", "ok", "Tiles ✅"));
        base.on("tileerror", () => setBadge("status-tiles", "warn", "Tiles ⚠️"));
        base.addTo(map);

        radarLayer = L.tileLayer.wms("https://opengeo.ncep.noaa.gov/geoserver/conus/conus_bref_qcd/ows?", {
          layers: "conus_bref_qcd",
          format: "image/png",
          transparent: true,
          version: "1.3.0",
          crs: L.CRS.EPSG3857,
          opacity: 0.32
        });

        radarLayer.on("load", () => setBadge("status-radar", "ok", "Radar ✅"));
        radarLayer.on("tileerror", () => setBadge("status-radar", "warn", "Radar ⚠️"));
        radarLayer.addTo(map);

        countyLayer = L.layerGroup().addTo(map);

        COUNTIES.forEach(c => {
          L.circleMarker([c.lat, c.lon], {
            radius: 4,
            color: "#0ea5e9",
            fillColor: "#0ea5e9",
            fillOpacity: 0.95,
            weight: 1
          }).addTo(countyLayer);

          L.marker([c.lat, c.lon], {
            icon: L.divIcon({
              className: "county-label",
              html: c.name,
              iconSize: null
            })
          }).addTo(countyLayer);
        });

        const bounds = L.latLngBounds(COUNTIES.map(c => [c.lat, c.lon]));
        map.fitBounds(bounds.pad(0.45));
      }

      async function fetchNOAAHourly(lat, lon) {
        try {
          const p = await fetch(`https://api.weather.gov/points/${lat},${lon}`, { headers: NOAA_HEADERS });
          if (!p.ok) throw new Error(`points status ${p.status}`);

          const meta = await p.json();
          const hourlyUrl = meta?.properties?.forecastHourly;
          if (!hourlyUrl) throw new Error("missing forecastHourly");

          const f = await fetch(hourlyUrl, { cache: "no-store", headers: NOAA_HEADERS });
          if (!f.ok) throw new Error(`hourly status ${f.status}`);

          const hourly = await f.json();
          setBadge("status-noaa", "ok", "NOAA ✅");
          return hourly?.properties?.periods?.[0] ?? null;
        } catch (e) {
          console.warn("NOAA fetch failed", e);
          setBadge("status-noaa", "warn", "NOAA ⚠️");
          return null;
        }
      }

      function renderCardsStart() {
        document.getElementById("cards").innerHTML = "";
      }

      function renderCountyCard({ name }, now) {
        const el = document.createElement("article");
        el.className = "card";

        const summary = now
          ? `${now.temperature}°F • ${now.relativeHumidity?.value ?? "N/A"}% RH • ${now.windSpeed ?? "N/A"} ${now.windDirection ?? ""}`
          : "N/A";

        const label = now?.shortForecast ?? "N/A";

        el.innerHTML = `
          <h3>${label.includes("Thunder") ? "⛈️" : "🌤️"} ${name}</h3>
          <div class="dim">Class: ${label}</div>
          <div class="metric">Wx: ${summary}</div>
          <div class="metric">Map: faint NOAA reflectivity background</div>
        `;

        document.getElementById("cards").appendChild(el);
      }

      async function refresh() {
        renderCardsStart();

        for (const county of COUNTIES) {
          const now = await fetchNOAAHourly(county.lat, county.lon);
          renderCountyCard(county, now);
        }

        const names = [...document.querySelectorAll("#cards .card h3")].map(h => h.textContent);

        if (!names.some(t => t.includes("Brunswick")) || !names.some(t => t.includes("Greensville"))) {
          showAlert("Self-check failed: Brunswick and/or Greensville not rendered.");
        } else {
          const box = document.getElementById("alerts");
          if (box) box.hidden = true;
        }

        if (radarLayer) radarLayer.redraw();
      }

      window.addEventListener("DOMContentLoaded", () => {
        initMap();
        refresh();
        setInterval(refresh, 60 * 60 * 1000);
      });

      const toggle = document.getElementById("themeToggle");
      if (toggle) {
        toggle.addEventListener("click", () => {
          document.body.classList.toggle("dark");
          toggle.textContent = document.body.classList.contains("dark") ? "☀️ Light" : "🌙 Dark";
        });
      }
    </script>
  </body>
</html>
